<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordle Maker & Solver</title>
<style>
        :root {
            --bg-color: #121213;
            --text-color: #d7dadc;
            --correct-color: #538d4e;
            --present-color: #b59f3b;
            --absent-color: #3a3a3c;
            --border-color: #565758;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Clear Sans', 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            /* Prevents whole page from scrolling, only logs will scroll */
        }

        /* --- Top Half: Game UI --- */
        .top-half {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-y: auto;
        }

        h1 {
            margin: 0 0 5px 0;
        }

        p.subtitle {
            margin: 0 0 20px 0;
            color: #818384;
            font-size: 0.9rem;
        }

        /* Board Styles */
        #board {
            display: grid;
            grid-template-rows: repeat(6, 1fr);
            gap: 5px;
            margin-bottom: 25px;
        }

        .row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 5px;
        }

        .tile {
            width: 60px;
            height: 60px;
            border: 2px solid var(--border-color);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-weight: bold;
            text-transform: uppercase;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        .tile.g {
            background-color: var(--correct-color);
            border-color: var(--correct-color);
        }

        .tile.y {
            background-color: var(--present-color);
            border-color: var(--present-color);
        }

        .tile.b {
            background-color: var(--absent-color);
            border-color: var(--absent-color);
        }

        /* Controls */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 400px;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 12px;
            background: #2a2a2a;
            border: 1px solid var(--border-color);
            color: white;
            font-size: 1rem;
            text-transform: uppercase;
            border-radius: 4px;
        }

        input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 12px;
            cursor: pointer;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            transition: opacity 0.2s, transform 0.1s;
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        #submit-btn {
            background-color: var(--correct-color);
            color: white;
        }

        #auto-solve-btn {
            background-color: #85c0f9;
            color: #121213;
        }

        #restart-btn {
            background-color: var(--border-color);
            color: white;
        }

        /* --- Bottom Half: Logs --- */
        .bottom-half {
            height: 35vh;
            /* Takes up bottom 35% of the screen */
            background: #000;
            border-top: 3px solid var(--border-color);
            padding: 15px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        .log-header {
            color: var(--border-color);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            font-weight: bold;
        }

        #log-container {
            flex: 1;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9rem;
            overflow-y: auto;
            color: #0f0;
        }

        .log-entry {
            margin-bottom: 5px;
            line-height: 1.4;
        }

        .log-entry.system {
            color: #fff;
        }

        .log-entry.code {
            color: #ff0;
        }

        .log-entry.success {
            color: #0f0;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(0, 255, 0, 0.5);
        }

        .log-entry.error {
            color: #ff4a4a;
        }
    </style>
</head>

<body>

    <div class="top-half">

        <p class="subtitle">Using algorithms from C++ Maker & Solver</p>

        <div class="controls">
            <div class="input-group">

            </div>
            <div class="button-group">
                <button id="auto-solve-btn" onclick="startAutoSolve()">🤖 Auto-Solve</button>

            </div>
        </div>
    </div>

        <div class="log-header">System Logs & Solver Output</div>
        <div id="log-container">

    </div>

        // --- State Variables ---
        let targetWord = "";
        let currentAttempt = 0;
        let gameOver = false;
        let accumulatedSolverCode = ""; // Stores "g a 1 b p 2..." for the solver

        const TRY_WORDS = ["brick", "glent", "jumpy", "vozhd", "waqfs"];

        // --- Initialization ---
        function createBoard() {
            const board = document.getElementById("board");
            board.innerHTML = ''; // Clear existing
            for (let i = 0; i < 6; i++) {
                const row = document.createElement("div");
                row.className = "row";
                row.id = `row-${i}`;
                for (let j = 0; j < 5; j++) {
                    const tile = document.createElement("div");
                    tile.className = "tile";
                    tile.id = `tile-${i}-${j}`;
                    row.appendChild(tile);
                }
                board.appendChild(row);
            }
        }

        function initGame() {
            if (words.length > 0) {

                log(`Loaded ${words.length} words into memory.`, "system");
                log("A random word has been chosen by me :)", "system");
            } else {
                log("Error: Words array is empty!", "error");
            }
        }

        function restartGame() {
            // Reset logic state
            currentAttempt = 0;
            gameOver = false;
            accumulatedSolverCode = "";

            // Reset UI state
            document.getElementById("auto-solve-btn").disabled = false;
            document.getElementById("submit-btn").disabled = false;
            document.getElementById("guess-input").disabled = false;
            document.getElementById("guess-input").value = "";
            document.getElementById("log-container").innerHTML = ""; // Clear logs

            // Rebuild board and pick new word
            createBoard();
            log("--- GAME RESTARTED ---", "system");
            initGame();
        }

        // --- Maker Logic (Translated directly from wordle_maker.cpp) ---
        function getFeedbackCode(guess) {
            let code = "";
            for (let j = 0; j < 5; j++) {
                let charac = guess[j];

                if (targetWord[j] === charac) {
                    code += "g" + charac + (j + 1);
                } else if (targetWord.includes(charac)) {
                    code += "y" + charac + (j + 1);
                } else {
                    code += "b" + charac + (j + 1);
                }
            }
            return code;
        }

        // --- Game Flow ---
        function handleManualGuess() {
            if (gameOver) return;
            const input = document.getElementById("guess-input");
            const guess = input.value.toLowerCase();

            if (guess.length !== 5) {
                alert("Guess must be exactly 5 letters!");
                return;
            }

            processGuess(guess);
            input.value = "";
        }

        function processGuess(guess) {
            log(`> Guess ${currentAttempt + 1}: ${guess}`);

            const row = document.getElementById(`row-${currentAttempt}`);
            for (let j = 0; j < 5; j++) {
                const tile = document.getElementById(`tile-${currentAttempt}-${j}`);
                tile.innerText = guess[j];
            }

            const code = getFeedbackCode(guess);
            log(`Code: ${code}`, "code");
            accumulatedSolverCode += code;

            let isCorrect = true;
            for (let t = 0; t < code.length; t += 3) {
                const status = code[t];
                const posIndex = (code[t + 2] - '0') - 1;

                const tile = document.getElementById(`tile-${currentAttempt}-${posIndex}`);
                tile.classList.add(status);

                if (status !== 'g') {
                    isCorrect = false;
                }
            }

            currentAttempt++;

            if (isCorrect) {
                log(`You guessed the word! :) It was ${targetWord.toUpperCase()}`, "success");
                endGame();
                return true;
            } else if (currentAttempt >= 6) {
                log(`Game over! The word was ${targetWord.toUpperCase()}`, "error");
                endGame();
            }
            return false;
        }

        function endGame() {
            gameOver = true;
            document.getElementById("auto-solve-btn").disabled = true;
            document.getElementById("submit-btn").disabled = true;
            document.getElementById("guess-input").disabled = true;
        }

        // --- Solver Logic (Translated directly from worrdle_solver.cpp) ---
        function containAtPos(s, c, pos) { return s[pos - 1] === c; }

        function containNotAtPos(s, c, pos) {
            let exist = false;
            for (let i = 0; i < s.length; i++) {
                if (s[i] === c && i !== (pos - 1)) exist = true;
            }
            if (s[pos - 1] === c) exist = false;
            return exist;
        }

        function shouldNotContain(s, c) {
            let exist = true;
            for (let i = 0; i < s.length; i++) {
                if (s[i] === c) exist = false;
            }
            return exist;
        }

        async function startAutoSolve() {
            if (gameOver) return;

            // Disable inputs so user can't interfere with the bot
            document.getElementById("auto-solve-btn").disabled = true;
            document.getElementById("submit-btn").disabled = true;
            document.getElementById("guess-input").disabled = true;

            log("--- INITIATING AUTO SOLVER ---", "system");

            // Input hardcoded TRY words
            for (let i = 0; i < TRY_WORDS.length; i++) {
                if (gameOver || currentAttempt >= 6) break;
                await sleep(600);
                const win = processGuess(TRY_WORDS[i]);
                if (win) return;
            }

            if (gameOver) return;

            log("Filtering dictionary against accumulated code...", "system");
            await sleep(500);

            // Filter logic matching C++
            let results = [];
            for (let i = 0; i < words.length; i++) {
                let to_add = true;
                let j = 0;
                let word = words[i];
                let code = accumulatedSolverCode;

                while (j < code.length) {
                    let type = code[j];
                    let charac = code[j + 1];
                    let pos = parseInt(code[j + 2]);

                    if (type === 'g') {
                        let result = containAtPos(word, charac, pos);
                        to_add = to_add && result;
                    }
                    else if (type === 'y') {
                        let result = containNotAtPos(word, charac, pos);
                        to_add = to_add && result;
                    }
                    else if (type === 'b') {
                        let result = shouldNotContain(word, charac);
                        to_add = to_add && result;
                    }
                    j += 3;
                }
                if (to_add) results.push(word);
            }

            // Results handling
            if (results.length === 1) {
                log("Here is the exact solution: " + results[0], "success");
                await sleep(800);
                if (!gameOver && currentAttempt < 6) processGuess(results[0]);
            }
            else if (results.length > 1) {
                log(`Here are possible solutions (${results.length}):`, "system");
                results.slice(0, 8).forEach(r => log(` - ${r}`));
                if (results.length > 8) log("   ...");

                await sleep(1000);
                if (!gameOver && currentAttempt < 6) {
                    log(`Trying the first possible solution: ${results[0]}`, "system");
                    processGuess(results[0]);
                }
            }
            else {
                log("No solution found", "error");
                endGame();
            }
        }

        // --- Utilities ---
        function log(message, type = "") {
            const container = document.getElementById("log-container");
            const div = document.createElement("div");
            div.className = `log-entry ${type}`;
            div.innerText = message;
            container.appendChild(div);
            // Auto-scroll to bottom
            container.scrollTop = container.scrollHeight;
        }

        function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

        document.getElementById("guess-input").addEventListener("keypress", function (event) {
            if (event.key === "Enter") {
                event.preventDefault();
                handleManualGuess();
            }
        });

        // Start up
        window.onload = () => {
            createBoard();
            initGame();
        };
