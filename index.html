<!DOCTYPE html>
<html>
<head>
  <style>
    /* This is where the CSS goes */
    body { background-color: #121213; display: flex; justify-content: center; padding-top: 50px; }
    .tile {
      width: 60px; height: 60px;
      border: 2px solid #3a3a3c;
      color: white;
      display: flex; justify-content: center; align-items: center;
      font-size: 32px; font-family: Arial; font-weight: bold;
    }
    /* This makes the tile green! */
    .correct { background-color: #538d4e; border: none; }
  </style>
</head>
<body>

  <div class="row">
    <div class="tile correct">G</div>
    <div class="tile">R</div>
    <div class="tile">A</div>
    <div class="tile">P</div>
    <div class="tile">H</div>
  </div>

</body>
</html>
