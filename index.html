<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordle</title>
    <style>
        body {
            background-color: #121213;
            color: white;
            font-family: 'Clear Sans', 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            height: 100vh;
        }


        .split-container {
            display: flex;
            height: 100%;
            width: 100%;
            position: relative;
            z-index: 1;

        }

        #main-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            color: #0f0;
            opacity: 0.15;
            overflow: hidden;
            white-space: pre;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.2rem;
            line-height: 1.1;
            pointer-events: none;

        }

        .game-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-right: 2px solid #3a3a3c;

        }

        #restart-btn {
            margin-top: 30px;
            padding: 12px 24px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            background-color: #538d4e;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        #restart-btn:hover {
            background-color: #43713f;

        }


        .terminal-side {
            flex: 1;

            background-color: #000;
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
        }

        .terminal-header {
            background-color: #222;
            color: #fff;
            padding: 10px;
            font-weight: bold;
            text-align: center;
            border-bottom: 2px solid #333;
        }

        #terminal-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            font-size: 1.1rem;
            line-height: 1.5;
        }

        @keyframes flipTile {
            0% {
                transform: rotateX(0deg);
            }

            50% {
                transform: rotateX(-90deg);
            }

            100% {
                transform: rotateX(0deg);
            }
        }

        .flip {
            animation: flipTile 0.5s ease-in;
        }

        #board {
            display: grid;
            grid-template-columns: repeat(5, 60px);
            grid-template-rows: repeat(6, 60px);
            gap: 5px;
        }

        .green {
            background-color: #538d4e !important;
            border-color: #538d4e !important;
            color: white;
        }

        .yellow {
            background-color: #b59f3b !important;
            border-color: #b59f3b !important;
            color: white;
        }

        .grey {
            background-color: #3a3a3c !important;
            border-color: #3a3a3c !important;
            color: white;
        }

        .tile {
            border: 2px solid #3a3a3c;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-weight: bold;
            text-transform: uppercase;
            box-sizing: border-box;
        }

        @keyframes pop {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.1);
                border-color: #818384;
            }

            100% {
                transform: scale(1);
            }
        }

        .animate-pop {
            animation: pop 0.1s ease-in-out;
        }
    </style>
</head>

<body>
    <div id="main-bg"> </div>

    <div class="split-container">
        <div class="game-side">
            <h1>Wordle game</h1>
            <div id="board"></div>
            <button id="restart-btn">Restart Game</button>
            <button id="solve-btn"
                style="margin-top: 10px; padding: 12px 24px; font-size: 1.2rem; font-weight: bold; color: white; background-color: #b59f3b; border: none; border-radius: 5px; cursor: pointer; transition: background-color 0.2s;">Let
                Bot Solve</button>
        </div>

        <div class="terminal-side">
            <div class="terminal-header">Events</div>
            <div id="terminal-content"></div>
        </div>
    </div>

    <script type="module" src="./pika.js"></script>

</body>

</html>
